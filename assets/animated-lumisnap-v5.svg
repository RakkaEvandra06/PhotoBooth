<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027">
        <animate attributeName="stop-color" values="#0f2027;#203a43;#2c5364;#0f2027" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="100%" stop-color="#2c5364">
        <animate attributeName="stop-color" values="#2c5364;#0f2027;#203a43;#2c5364" dur="8s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGradient)"></rect>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="5" fill="#00f2ff">
      <animate attributeName="cy" values="200;0;200" dur="6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="300" cy="50" r="4" fill="#00f2ff">
      <animate attributeName="cy" values="200;0;200" dur="5s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="600" cy="150" r="6" fill="#00f2ff">
      <animate attributeName="cy" values="200;0;200" dur="7s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <!-- Title -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="48" fill="#ffffff" filter="url(#glow)">
    LumiSnap
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"></animate>
  </text>

  <!-- Refactored Caption -->
  <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" fill="#a0e9ff">
    iOS • Android • Desktop — Capture photos, strips &amp; GIFs with filters, stickers &amp; 20+ templates
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"></animate>
  </text>
</svg>